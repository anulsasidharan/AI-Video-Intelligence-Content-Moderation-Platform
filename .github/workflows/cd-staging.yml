name: CD — Staging

on:
  # Staging environment not active — trigger manually only if needed.
  # Production deployments use cd-prod.yml.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}           # e.g. us-central1
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}       # e.g. vidshield
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_STAGING }}
  GKE_LOCATION: ${{ secrets.GKE_CLUSTER_LOCATION }}   # region or zone
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  K8S_NAMESPACE: vidshield

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  build-push:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-backend:${{ env.IMAGE_TAG }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-backend:staging-latest

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-agent:${{ env.IMAGE_TAG }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-agent:staging-latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            API_UPSTREAM_URL=${{ secrets.API_UPSTREAM_URL }}
            NEXT_PUBLIC_APP_ENV=staging
            NEXT_PUBLIC_MOCK_API=false
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-frontend:${{ env.IMAGE_TAG }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-frontend:staging-latest

  deploy-gke:
    name: Deploy GKE — Staging
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Roll out backend
        run: |
          kubectl set image deployment/vidshield-backend \
            api=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-backend:${{ env.IMAGE_TAG }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/vidshield-backend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Roll out worker
        run: |
          kubectl set image deployment/vidshield-worker \
            worker=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-agent:${{ env.IMAGE_TAG }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/vidshield-worker -n ${{ env.K8S_NAMESPACE }} --timeout=300s
