name: CD — Staging

on:
  # Staging environment not active — trigger manually only if needed.
  # Production deployments use cd-prod.yml.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  ECS_CLUSTER: vidshieldai-cluster-staging
  ECS_BACKEND_SERVICE: vidshield-staging-api
  ECS_WORKER_SERVICE: vidshield-staging-worker

permissions:
  contents: read

jobs:
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-backend-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-backend-prod:staging-latest

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-agent-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-agent-prod:staging-latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            API_UPSTREAM_URL=${{ secrets.API_UPSTREAM_URL }}
            NEXT_PUBLIC_APP_ENV=staging
            NEXT_PUBLIC_MOCK_API=false
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-frontend-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-frontend-prod:staging-latest

  deploy-ecs:
    name: Deploy ECS — Staging
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment — Backend API
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_BACKEND_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment — Worker
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WORKER_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Backend API stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_BACKEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}
