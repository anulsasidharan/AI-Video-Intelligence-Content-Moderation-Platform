name: CD — Production

on:
  # Trigger manually or on semver tag push
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Exact image tag to deploy (e.g. v1.2.3 or a git SHA)"
        required: true
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
  ECS_CLUSTER: vidshieldai-cluster-prod
  ECS_BACKEND_SERVICE: vidshield-prod-api
  ECS_WORKER_SERVICE: vidshield-prod-worker
  ECS_FRONTEND_SERVICE: vidshield-prod-frontend
  TASK_DEF_API: vidshield-prod-api
  TASK_DEF_WORKER: vidshield-prod-worker
  TASK_DEF_FRONTEND: vidshield-prod-frontend

permissions:
  contents: read

jobs:
  # ── Build & push images ───────────────────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-backend-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-backend-prod:latest

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-agent-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-agent-prod:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            API_UPSTREAM_URL=${{ secrets.API_UPSTREAM_URL }}
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_MOCK_API=false
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshieldai-frontend-prod:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshieldai-frontend-prod:latest

  # ── Deploy ECS services ───────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy ECS — Production
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Register new task definitions with the updated image tags ─────────────
      - name: Register new task def — Backend API
        id: register-api
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEF_API }} \
            --query 'taskDefinition' --output json)
          NEW_TD=$(echo "$CURRENT" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if 'vidshieldai-backend-prod' in c['image']:
                  c['image'] = c['image'].rsplit(':', 1)[0] + ':${{ env.IMAGE_TAG }}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(key, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Register new task def — Worker
        id: register-worker
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEF_WORKER }} \
            --query 'taskDefinition' --output json)
          NEW_TD=$(echo "$CURRENT" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if 'vidshieldai-agent-prod' in c['image'] or 'vidshieldai-backend-prod' in c['image']:
                  c['image'] = c['image'].rsplit(':', 1)[0] + ':${{ env.IMAGE_TAG }}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(key, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Register new task def — Frontend
        id: register-frontend
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEF_FRONTEND }} \
            --query 'taskDefinition' --output json)
          NEW_TD=$(echo "$CURRENT" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if 'vidshieldai-frontend-prod' in c['image']:
                  c['image'] = c['image'].rsplit(':', 1)[0] + ':${{ env.IMAGE_TAG }}'
              # Remove ECS container health check — ALB target group health check
              # (HTTP GET / on port 3000) is sufficient and more reliable.
              c.pop('healthCheck', None)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(key, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      # ── Update services to use the new task definitions ───────────────────────
      - name: Deploy — Backend API
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_BACKEND_SERVICE }} \
            --task-definition ${{ steps.register-api.outputs.arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy — Worker
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WORKER_SERVICE }} \
            --task-definition ${{ steps.register-worker.outputs.arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy — Frontend
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_FRONTEND_SERVICE }} \
            --task-definition ${{ steps.register-frontend.outputs.arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Backend API stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_BACKEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DISTRIBUTION_ID_PROD != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"
