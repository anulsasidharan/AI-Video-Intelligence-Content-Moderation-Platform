name: Rollback — Production

on:
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Image tag to roll back to (e.g. v1.2.3 or a git SHA)"
        required: true
      services:
        description: "Services to roll back (comma-separated: api,worker,frontend — or 'all')"
        required: false
        default: "all"
      reason:
        description: "Reason for rollback (logged in summary)"
        required: true

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_PROD }}
  GKE_LOCATION: ${{ secrets.GKE_CLUSTER_LOCATION }}
  ROLLBACK_TAG: ${{ github.event.inputs.rollback_tag }}
  K8S_NAMESPACE: vidshield

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  # ── Validate rollback target ────────────────────────────────────────────────────
  validate:
    name: Validate Rollback Target
    runs-on: ubuntu-latest

    outputs:
      rollback_api: ${{ steps.parse.outputs.rollback_api }}
      rollback_worker: ${{ steps.parse.outputs.rollback_worker }}
      rollback_frontend: ${{ steps.parse.outputs.rollback_frontend }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Parse target services
        id: parse
        run: |
          SERVICES="${{ github.event.inputs.services }}"
          if [ "$SERVICES" = "all" ]; then
            echo "rollback_api=true"      >> "$GITHUB_OUTPUT"
            echo "rollback_worker=true"   >> "$GITHUB_OUTPUT"
            echo "rollback_frontend=true" >> "$GITHUB_OUTPUT"
          else
            [[ "$SERVICES" == *"api"*      ]] && echo "rollback_api=true"      >> "$GITHUB_OUTPUT" || echo "rollback_api=false"      >> "$GITHUB_OUTPUT"
            [[ "$SERVICES" == *"worker"*   ]] && echo "rollback_worker=true"   >> "$GITHUB_OUTPUT" || echo "rollback_worker=false"   >> "$GITHUB_OUTPUT"
            [[ "$SERVICES" == *"frontend"* ]] && echo "rollback_frontend=true" >> "$GITHUB_OUTPUT" || echo "rollback_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify backend image exists in Artifact Registry
        if: steps.parse.outputs.rollback_api == 'true' || steps.parse.outputs.rollback_worker == 'true'
        run: |
          gcloud artifacts docker images describe \
            "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-backend:${{ env.ROLLBACK_TAG }}" \
            --project ${{ env.GCP_PROJECT_ID }} \
            || (echo "ERROR: backend image tag '${{ env.ROLLBACK_TAG }}' not found in Artifact Registry" && exit 1)

      - name: Verify frontend image exists in Artifact Registry
        if: steps.parse.outputs.rollback_frontend == 'true'
        run: |
          gcloud artifacts docker images describe \
            "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-frontend:${{ env.ROLLBACK_TAG }}" \
            --project ${{ env.GCP_PROJECT_ID }} \
            || (echo "ERROR: frontend image tag '${{ env.ROLLBACK_TAG }}' not found in Artifact Registry" && exit 1)

  # ── Snapshot current deployment revision (for audit trail) ─────────────────────
  snapshot:
    name: Snapshot Current Revisions
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      current_backend_image:  ${{ steps.snap.outputs.current_backend_image }}
      current_worker_image:   ${{ steps.snap.outputs.current_worker_image }}
      current_frontend_image: ${{ steps.snap.outputs.current_frontend_image }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Record current active images
        id: snap
        run: |
          BACKEND_IMG=$(kubectl get deployment vidshield-backend \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="api")].image}' 2>/dev/null || echo "unknown")
          WORKER_IMG=$(kubectl get deployment vidshield-worker \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="worker")].image}' 2>/dev/null || echo "unknown")
          FRONTEND_IMG=$(kubectl get deployment vidshield-frontend \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="frontend")].image}' 2>/dev/null || echo "unknown")

          echo "current_backend_image=$BACKEND_IMG"  >> "$GITHUB_OUTPUT"
          echo "current_worker_image=$WORKER_IMG"    >> "$GITHUB_OUTPUT"
          echo "current_frontend_image=$FRONTEND_IMG" >> "$GITHUB_OUTPUT"

          echo "### Current Images (pre-rollback)"       >> "$GITHUB_STEP_SUMMARY"
          echo "| Service  | Image |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|"                    >> "$GITHUB_STEP_SUMMARY"
          echo "| API      | \`$BACKEND_IMG\` |"         >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker   | \`$WORKER_IMG\` |"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | \`$FRONTEND_IMG\` |"        >> "$GITHUB_STEP_SUMMARY"

  # ── Roll back GKE deployments ───────────────────────────────────────────────────
  rollback-gke:
    name: Rollback GKE — Production
    runs-on: ubuntu-latest
    needs: [validate, snapshot]

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Rollback — Backend API
        if: needs.validate.outputs.rollback_api == 'true'
        run: |
          kubectl set image deployment/vidshield-backend \
            api=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-backend:${{ env.ROLLBACK_TAG }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/vidshield-backend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Rollback — Worker
        if: needs.validate.outputs.rollback_worker == 'true'
        run: |
          kubectl set image deployment/vidshield-worker \
            worker=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-agent:${{ env.ROLLBACK_TAG }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/vidshield-worker -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Rollback — Frontend
        if: needs.validate.outputs.rollback_frontend == 'true'
        run: |
          kubectl set image deployment/vidshield-frontend \
            frontend=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/vidshieldai-frontend:${{ env.ROLLBACK_TAG }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/vidshield-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Invalidate Cloud CDN cache (frontend rolled back)
        if: needs.validate.outputs.rollback_frontend == 'true' && vars.CLOUD_CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CLOUD_CDN_URL_MAP }} \
            --path "/*" \
            --project ${{ env.GCP_PROJECT_ID }} \
            --async

  # ── Post-rollback summary ───────────────────────────────────────────────────────
  summary:
    name: Rollback Summary
    runs-on: ubuntu-latest
    needs: [validate, snapshot, rollback-gke]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## Rollback Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field        | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback tag | \`${{ env.ROLLBACK_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Services     | \`${{ github.event.inputs.services }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason       | ${{ github.event.inputs.reason }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status       | ${{ needs.rollback-gke.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pre-rollback Images" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service  | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API      | \`${{ needs.snapshot.outputs.current_backend_image }}\` |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker   | \`${{ needs.snapshot.outputs.current_worker_image }}\` |"   >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | \`${{ needs.snapshot.outputs.current_frontend_image }}\` |" >> "$GITHUB_STEP_SUMMARY"
