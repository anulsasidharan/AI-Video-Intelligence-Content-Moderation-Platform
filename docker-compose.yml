services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Mount source so API + migrations match your working tree without rebuilding the image.
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # These override any matching keys in backend/.env
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vidshield
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/vidshield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
      # Uvicorn: trust X-Forwarded-Proto from ALB/NGINX so redirects use https://
      FORWARDED_ALLOW_IPS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations, seed initial users, then start the API server
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_admin.py &&
             uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Same code as backend — required so Celery runs the current AI pipeline (e.g. agent audit).
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # These override any matching keys in backend/.env
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vidshield
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/vidshield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 --queues video,moderation,analytics,cleanup,reports,notifications,streams

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: http://localhost:8000
        NEXT_PUBLIC_APP_ENV: development
        # Mock API works without a running backend; set "false" to use a real backend.
        NEXT_PUBLIC_MOCK_API: "true"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
